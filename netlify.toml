[build]
base = "app/frontend"
command = "pnpm install --frozen-lockfile && pnpm build"
publish = "dist"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"
external_node_modules = ["mongoose", "mongodb", "bson"]

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200
